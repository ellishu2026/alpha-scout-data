<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alpha Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root {
  --white:#fff; --ink:#111; --ink2:#555; --ink3:#999; --ink4:#ccc;
  --rule:#e8e8e4; --rule2:#f2f2ef;
  --row-alt:#fafaf8; --row-hover:#f4f3ef; --row-exp:#f8f7f3;
  --pill-bg:#f2f2ef; --pill-act:#1a1a1a;
  --c90:#16a34a; --c80:#2563eb; --c70:#d97706; --c60:#dc2626;
  --bar-90:#22c55e; --bar-80:#3b82f6; --bar-70:#f59e0b; --bar-60:#ef4444;
  --font-serif:'Cormorant Garamond',Georgia,serif;
  --font-mono:'DM Mono','Menlo',monospace;
  --rp:20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--font-mono);
     font-size:12.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
header{border-bottom:2px solid var(--ink);padding:18px 32px 14px;
       display:flex;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-family:var(--font-serif);font-size:26px;font-weight:700;
      letter-spacing:-.3px;line-height:1;margin-right:16px}
.logo em{font-style:normal;color:var(--c80)}
.hm{display:flex;gap:18px;flex-wrap:wrap;align-items:center;
    margin-left:auto;font-size:10.5px;color:var(--ink3)}
.hm b{color:var(--ink);font-weight:500}
.ver{font-size:10px;color:var(--ink4);border:1px solid var(--rule);
     padding:2px 7px;border-radius:3px}
.toolbar{border-bottom:1px solid var(--rule);padding:10px 32px 0}
.legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;
        margin-bottom:10px;font-size:11px;color:var(--ink2)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:12px;align-items:center}
.pill{font-family:var(--font-mono);font-size:11.5px;padding:5px 16px;
      border-radius:var(--rp);border:1.5px solid var(--rule);
      background:var(--pill-bg);color:var(--ink2);cursor:pointer;
      transition:all .12s;white-space:nowrap}
.pill:hover{border-color:var(--ink3);color:var(--ink)}
.pill.active{background:var(--pill-act);border-color:var(--pill-act);color:#fff;font-weight:500}
.pill-wl.active{background:var(--c80);border-color:var(--c80)}
.filter-sep{width:1px;background:var(--rule);margin:0 2px;align-self:stretch;min-height:28px}
#dropped-bar{display:none;padding:8px 32px;
             background:#fef9ec;border-bottom:1px solid #fde68a;
             font-size:11px;color:#92400e}
#dropped-bar b{color:#78350f}
#wl-bar{border-bottom:1px solid var(--rule);padding:10px 32px;
        background:var(--row-alt);display:none}
.wl-top{display:flex;align-items:center;margin-bottom:7px;gap:10px}
.wl-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink4)}
.wl-mgr-btn{font-size:10px;padding:2px 10px;border:1px solid var(--rule);
            border-radius:var(--rp);background:var(--white);color:var(--ink3);
            cursor:pointer;margin-left:auto;transition:all .12s}
.wl-mgr-btn:hover{border-color:var(--ink3);color:var(--ink)}
.wl-chips{display:flex;gap:6px;flex-wrap:wrap}
.wl-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--rule);
         padding:4px 12px;background:var(--white);border-radius:var(--rp);
         cursor:pointer;font-size:11.5px;transition:border-color .1s}
.wl-chip:hover{border-color:var(--ink3)}
.wl-chip.dim{opacity:.4;cursor:default}
.wl-tick{font-weight:500;color:var(--ink)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:860px}
thead th{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;
         color:var(--ink3);font-weight:400;padding:9px 10px 8px;
         border-bottom:1px solid var(--rule);text-align:left;white-space:nowrap;
         background:var(--white);position:sticky;top:0;z-index:2}
thead th.r{text-align:right}
thead th.clickable{cursor:pointer;text-decoration:underline dotted;
                   text-underline-offset:3px}
thead th.clickable:hover{color:var(--ink)}
tbody tr.stock-row{border-bottom:1px solid var(--rule2);cursor:pointer;transition:background .08s}
tbody tr.stock-row:nth-child(4n+1),
tbody tr.stock-row:nth-child(4n+2){background:var(--row-alt)}
tbody tr.stock-row:hover{background:var(--row-hover)!important}
tbody tr.stock-row.is-wl{border-left:2px solid var(--c80)}
tbody tr.stock-row.expanded{background:var(--row-exp)!important}
td{padding:7px 10px;vertical-align:middle;white-space:nowrap}
.td-rank{color:var(--ink4);font-size:11px;width:28px;text-align:right;padding-right:4px}
.td-chg{width:36px;text-align:center;font-size:10px;font-weight:500}
.chg-new{color:var(--c90)}.chg-up{color:var(--c80)}.chg-dn{color:var(--c60)}.chg-flat{color:var(--ink4)}
.td-ticker{font-weight:500;font-size:13px;color:var(--ink);width:60px}
.wl-mark{display:inline-block;width:4px;height:4px;border-radius:50%;
         background:var(--c80);margin-right:5px;vertical-align:middle;margin-bottom:2px}
.td-name{color:var(--ink2);font-size:11.5px;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.sbadge{display:inline-block;font-size:10px;padding:2px 8px;
        border-radius:var(--rp);font-weight:500;white-space:nowrap}
.sb-科技{background:#eff6ff;color:#1d4ed8}.sb-医疗{background:#f0fdf4;color:#15803d}
.sb-金融{background:#fff7ed;color:#c2410c}.sb-消费{background:#fdf4ff;color:#7e22ce}
.sb-工业{background:#f8fafc;color:#475569}.sb-公用{background:#ecfdf5;color:#065f46}
.sb-能源{background:#fefce8;color:#854d0e}.sb-地产{background:#fff1f2;color:#9f1239}
.sb-材料{background:#f0fdfa;color:#0f766e}.sb-通信{background:#faf5ff;color:#6b21a8}
.sb-其他{background:#f9fafb;color:#6b7280}
.td-mcap{text-align:right;font-size:11.5px;color:var(--ink2);padding-right:10px}
.td-fcf{text-align:right;padding-right:10px}
.fcf-wrap{display:inline-flex;flex-direction:column;align-items:flex-end;line-height:1.3}
.fcf-abs{font-size:11.5px;color:var(--ink)}
.fcf-yoy{font-size:10px}
.fcf-yoy.pos{color:var(--c90)}.fcf-yoy.neg{color:var(--c60)}.fcf-yoy.na{color:var(--ink4)}
.td-score{text-align:right;padding-right:10px}
.sw{display:inline-flex;align-items:center;gap:5px;justify-content:flex-end}
.sval{font-size:12.5px;font-weight:500;min-width:32px;text-align:right;letter-spacing:-.2px}
.sbar{width:32px;height:2px;background:var(--rule);border-radius:1px;overflow:hidden;flex-shrink:0}
.sbar-fill{height:100%;border-radius:1px;width:0;transition:width .7s cubic-bezier(.16,1,.3,1)}
.c90{color:var(--c90)}.c90 .sbar-fill{background:var(--bar-90)}
.c80{color:var(--c80)}.c80 .sbar-fill{background:var(--bar-80)}
.c70{color:var(--c70)}.c70 .sbar-fill{background:var(--bar-70)}
.c60{color:var(--c60)}.c60 .sbar-fill{background:var(--bar-60)}
.cna{color:var(--ink4)}
.td-dq{text-align:right}
.dq{display:inline-block;font-size:9px;text-transform:uppercase;
    letter-spacing:.06em;padding:1px 5px;border-radius:3px;font-weight:500;border:1px solid transparent}
.dq-h{color:#15803d;border-color:#bbf7d0;background:#f0fdf4}
.dq-m{color:#b45309;border-color:#fde68a;background:#fffbeb}
.dq-l{color:#b91c1c;border-color:#fecaca;background:#fef2f2}
.td-arr{width:18px;text-align:right;padding-right:10px}
.arr-icon{display:inline-block;font-size:8px;color:var(--ink4);transition:transform .18s}
tr.expanded .arr-icon{transform:rotate(90deg);color:var(--ink2)}
.detail-row{display:none}
.detail-row.open{display:table-row}
.detail-cell{padding:0 10px 16px 52px;background:var(--row-exp);border-bottom:1px solid var(--rule)}
.detail-rs{font-size:11px;color:var(--ink2);margin-top:10px;padding:6px 10px;
           background:var(--white);border:1px solid var(--rule);
           border-radius:4px;display:inline-block}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
          gap:1px;background:var(--rule);border:1px solid var(--rule);
          margin-top:8px;max-width:900px}
.ind-card{background:var(--white);padding:9px 11px;cursor:pointer}
.ind-card:hover{background:var(--row-alt)}
.ind-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;
           color:var(--ink3);margin-bottom:3px}
.ind-val{font-size:16px;font-weight:300;letter-spacing:-.5px;line-height:1}
.ind-val.pos{color:var(--c90)}.ind-val.neg{color:var(--c60)}.ind-val.na{color:var(--ink4);font-size:12px}
.ind-sfx{font-size:10px;color:var(--ink3);margin-left:1px}
#empty{padding:64px 32px;text-align:center;color:var(--ink4);
       font-size:11px;display:none;letter-spacing:.08em;text-transform:uppercase}
footer{border-top:1px solid var(--rule);padding:12px 32px;font-size:10px;color:var(--ink4)}
/* 自选股 Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);
               z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border:1px solid var(--rule);border-radius:6px;
       padding:24px 28px;width:420px;max-width:95vw;max-height:85vh;
       overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-title{font-family:var(--font-serif);font-size:20px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink3)}
.wl-list-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--rule2)}
.wl-list-tick{font-weight:500;font-size:13px;flex:1}
.wl-list-score{font-size:12px;min-width:40px;text-align:right}
.wl-del-btn{font-size:11px;padding:2px 8px;border:1px solid var(--rule);border-radius:3px;
            background:none;color:var(--ink3);cursor:pointer}
.wl-del-btn:hover{border-color:var(--c60);color:var(--c60)}
.modal-add{display:flex;gap:8px;margin:12px 0}
.modal-input{flex:1;border:1.5px solid var(--rule);border-radius:3px;padding:6px 10px;
             font-family:var(--font-mono);font-size:12.5px;outline:none}
.modal-input:focus{border-color:var(--ink3)}
.modal-btn{padding:6px 14px;border-radius:3px;border:none;font-family:var(--font-mono);
           font-size:12px;cursor:pointer;font-weight:500}
.modal-btn-add{background:var(--ink);color:#fff}
.modal-msg{font-size:11px;color:var(--ink3);margin-top:8px;min-height:16px;text-align:center}
.modal-note{font-size:10px;color:var(--ink4);margin-top:10px;line-height:1.6;
            border-top:1px solid var(--rule2);padding-top:10px}
/* 字段解释 Modal */
.exp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
             z-index:200;align-items:center;justify-content:center}
.exp-overlay.open{display:flex}
.exp-modal{background:var(--white);border:1px solid var(--rule);border-radius:6px;
           padding:28px 32px;width:580px;max-width:96vw;max-height:90vh;
           overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.exp-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink3)}
.exp-close:hover{color:var(--ink)}
.exp-lock{text-align:center;padding:32px 0}
.exp-lock p{font-size:12px;color:var(--ink3);margin-bottom:16px}
.exp-lock input{border:1.5px solid var(--rule);border-radius:4px;padding:8px 14px;
                font-family:var(--font-mono);font-size:13px;outline:none;
                text-align:center;letter-spacing:.1em;width:200px;display:block;margin:0 auto 10px}
.exp-lock input:focus{border-color:var(--ink3)}
.exp-lock button{display:block;width:200px;margin:0 auto;padding:8px;
                 background:var(--ink);color:#fff;border:none;border-radius:4px;
                 font-family:var(--font-mono);font-size:12px;cursor:pointer}
.exp-lock .exp-err{color:var(--c60);font-size:11px;margin-top:8px}
.exp-dim-title{font-family:var(--font-serif);font-size:22px;font-weight:700;
               color:var(--ink);margin-bottom:4px}
.exp-dim-sub{font-size:11px;color:var(--ink3);margin-bottom:20px;line-height:1.6}
.exp-ind{border:1px solid var(--rule);border-radius:4px;margin-bottom:12px;overflow:hidden}
.exp-ind-hd{background:var(--row-alt);padding:10px 14px;
            display:flex;align-items:baseline;justify-content:space-between;
            border-bottom:1px solid var(--rule)}
.exp-ind-hd-name{font-weight:500;font-size:12.5px;color:var(--ink)}
.exp-ind-hd-wt{font-size:10px;color:var(--ink3)}
.exp-ind-body{padding:12px 14px;font-size:12px;line-height:1.8;color:var(--ink2)}
.exp-ind-body b{color:var(--ink);font-weight:500}
.exp-formula{background:var(--row-alt);border:1px solid var(--rule2);border-radius:3px;
             padding:6px 12px;font-family:var(--font-mono);font-size:11.5px;
             color:var(--ink);margin:6px 0;display:block}
.exp-tbl{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px}
.exp-tbl th{text-align:left;color:var(--ink3);font-weight:400;
            padding:3px 8px;border-bottom:1px solid var(--rule)}
.exp-tbl td{padding:3px 8px;color:var(--ink2)}
.exp-tbl tr:nth-child(even){background:var(--row-alt)}
@media(max-width:640px){
  header{padding:14px 16px 12px}.toolbar{padding:10px 16px 0}
  #wl-bar{padding:10px 16px}.logo{font-size:20px}
  .td-name,.td-mcap{display:none}td{padding:6px 6px}
  thead th{padding:8px 6px 7px}.detail-cell{padding-left:18px}}

</style>
</head>
<body>
<header>
  <div class="logo">Alpha<em>Scout</em></div>
  <div class="hm">
    <span>更新 <b id="js-date">—</b></span>
    <span>扫描 <b id="js-univ">—</b> 家</span>
    <span>Top 15</span>
    <span style="color:var(--ink4)">$50亿–$300亿</span>
    <span class="ver" id="js-ver">v2.0</span>
  </div>
</header>
<div class="toolbar">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--bar-90)"></div><span>&#8805;90 卓越</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--bar-80)"></div><span>&#8805;80 优秀</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--bar-70)"></div><span>&#8805;70 良好</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--bar-60)"></div><span>&lt;70 偏弱</span></div>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="pill active" data-s="ALL" onclick="setFilter('ALL')">全部</button>
    <button class="pill pill-wl" id="pill-wl" data-s="WL" onclick="setFilter('WL')" style="display:none">自选</button>
    <span class="filter-sep"></span>
  </div>
</div>
<div id="dropped-bar"></div>
<div id="wl-bar">
  <div class="wl-top">
    <span class="wl-label">自选股</span>
    <button class="wl-mgr-btn" onclick="openModal()">&#9881; 管理自选股</button>
  </div>
  <div class="wl-chips" id="wl-chips"></div>
</div>
<div class="table-wrap">
<table>
<thead>
<tr>
  <th class="r">#</th>
  <th>变化</th>
  <th>代码</th>
  <th>公司名称</th>
  <th>板块</th>
  <th class="r">总市值</th>
  <th class="r">FCF (TTM)</th>
  <th class="r clickable" onclick="openExplain('overall')">综合分 &#8595;</th>
  <th class="r clickable" onclick="openExplain('accel')">加速度(40%)</th>
  <th class="r clickable" onclick="openExplain('quality')">质量(25%)</th>
  <th class="r clickable" onclick="openExplain('capital')">资本行动(25%)</th>
  <th class="r clickable" onclick="openExplain('expect')">预期(10%)</th>
  <th class="r">数据</th>
  <th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
<div id="empty">该板块暂无数据</div>
</div>
<footer>Alpha Scout v2.0 · 数据来源 Finnhub + Polygon · 仅供参考，不构成投资建议</footer>
<!-- 自选股管理 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#215;</button>
    <div class="modal-title">管理自选股</div>
    <div class="wl-list" id="modal-list"></div>
    <div class="modal-add">
      <input class="modal-input" id="modal-input" placeholder="输入股票代码 (如 TSLA)"
             onkeydown="if(event.key==='Enter')addTicker()">
      <button class="modal-btn modal-btn-add" onclick="addTicker()">添加</button>
    </div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-note">评分数据来自上次 scan_watchlist.py 的结果。</div>
  </div>
</div>
<!-- 字段解释 Modal -->
<div class="exp-overlay" id="exp-overlay" onclick="closeExplainOutside(event)">
  <div class="exp-modal">
    <button class="exp-close" onclick="closeExplain()">&#215;</button>
    <div id="exp-lock">
      <div class="exp-lock">
        <div style="font-family:var(--font-serif);font-size:22px;font-weight:700;margin-bottom:8px">字段说明</div>
        <p>请输入密码查看评分逻辑与计算方法</p>
        <input type="password" id="exp-pwd" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"
               onkeydown="if(event.key==='Enter')checkPwd()">
        <button onclick="checkPwd()">确认</button>
        <div class="exp-err" id="exp-err"></div>
      </div>
    </div>
    <div id="exp-content" style="display:none"></div>
  </div>
</div>

    const wl=wlTickers.map(t=>scoreMap[t]||{ticker:t,name:'',sector:'',market_cap:null,cn_sector:'其他',scores:{overall:null,accel:null,quality:null,capital:null,expect:null},rs:{},indicators:{},data_quality:'low',risk_flags:[],in_scan:false});
    const sc=wl.filter(s=>s.scores&&s.scores.overall!=null).sort((a,b)=>(b.scores.overall||0)-(a.scores.overall||0));
    list=[...sc,...wl.filter(s=>!s.scores||s.scores.overall==null)];
  }else if(activeSector==='ALL'){
    list=[...STOCKS].sort((a,b)=>(b.scores&&b.scores.overall||0)-(a.scores&&a.scores.overall||0));
  }else{
    list=STOCKS.filter(s=>s.cn_sector===activeSector).sort((a,b)=>(b.scores&&b.scores.overall||0)-(a.scores&&a.scores.overall||0));
  }
  const tbody=document.getElementById('tbody');
  document.getElementById('empty').style.display=list.length?'none':'block';
  tbody.innerHTML='';
  list.forEach(function(s,i){
    const sc=s.scores||{},isWL=wlSet.has(s.ticker),isExp=expandedTick===s.ticker;
    const sec=s.cn_sector||'其他';
    const tr=document.createElement('tr');
    tr.className='stock-row'+(isWL?' is-wl':'')+(isExp?' expanded':'');
    tr.dataset.ticker=s.ticker;
    tr.innerHTML=
      '<td class="td-rank">'+(sc.overall!=null?i+1:'—')+'</td>'+
      '<td class="td-chg">'+chgCell(s.rank_change||'—')+'</td>'+
      '<td class="td-ticker">'+(isWL?'<span class="wl-mark"></span>':'')+'<span>'+s.ticker+'</span></td>'+
      '<td class="td-name" title="'+(s.name||'')+'">'+(s.name||'').substring(0,24)+'</td>'+
      '<td><span class="sbadge sb-'+sec+'">'+sec+'</span></td>'+
      '<td class="td-mcap">'+fmtMcap(s.market_cap)+'</td>'+
      '<td class="td-fcf">'+fmtFCF(s)+'</td>'+
      '<td class="td-score">'+scoreCell(sc.overall)+'</td>'+
      '<td class="td-score">'+scoreCell(sc.accel)+'</td>'+
      '<td class="td-score">'+scoreCell(sc.quality)+'</td>'+
      '<td class="td-score">'+scoreCell(sc.capital)+'</td>'+
      '<td class="td-score">'+scoreCell(sc.expect)+'</td>'+
      '<td class="td-dq">'+dqBadge(s.data_quality)+'</td>'+
      '<td class="td-arr"><span class="arr-icon">&#9658;</span></td>';
    tr.addEventListener('click',function(){toggle(s.ticker);});
    tbody.appendChild(tr);
    const dr=document.createElement('tr');
    dr.className='detail-row'+(isExp?' open':'');
    dr.dataset.ticker=s.ticker;
    const dc=document.createElement('td');
    dc.className='detail-cell';dc.colSpan=14;
    if(isExp)dc.innerHTML=detailHtml(s);
    dr.appendChild(dc);tbody.appendChild(dr);
  });
  requestAnimationFrame(function(){
    document.querySelectorAll('.sbar-fill').forEach(function(el){el.style.width=el.dataset.pct+'%';});
  });
}

function toggle(ticker){
  expandedTick=expandedTick===ticker?null:ticker;
  render();
  if(expandedTick)setTimeout(function(){
    const el=document.querySelector('tr.expanded[data-ticker="'+ticker+'"]');
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },40);
}

function setFilter(s){
  activeSector=s;expandedTick=null;
  document.querySelectorAll('.pill').forEach(function(btn){btn.classList.toggle('active',btn.dataset.s===s);});
  render();
}

function buildFilters(){
  const row=document.getElementById('filter-row');
  SECTORS.forEach(function(s){
    const btn=document.createElement('button');
    btn.className='pill';btn.dataset.s=s;btn.textContent=s;
    btn.onclick=function(){setFilter(s);};row.appendChild(btn);
  });
}

function getWLStocks(){
  return wlTickers.map(function(t){

      scores:{overall:null,accel:null,quality:null,capital:null,expect:null},
      rs:{},indicators:{},data_quality:'low',risk_flags:[],in_scan:false};

function buildWLBar(){

  if(!wl.length)return;

function saveWL(){localStorage.setItem(LS_KEY,JSON.stringify(wlTickers));}

const LS_SCORES_KEY='alphascout_wl_scores_v2';

function loadWLScores(){
  try{const s=localStorage.getItem(LS_SCORES_KEY);if(s)return JSON.parse(s);}catch(e){}
  return {};
}
function saveWLScores(scores){
  localStorage.setItem(LS_SCORES_KEY,JSON.stringify(scores));
}

// 前端打分公式（复现 Python scoring.py）
function scoreIndicator(value, full, pass_, floor){
  if(value===null||value===undefined) return 50;
  if(value>=full) return 100;
  if(value<=floor) return 0;
  if(value>=pass_) return 50+50*(value-pass_)/(full-pass_);
  return 50*(value-floor)/(pass_-floor);
}

function calcScores(ind, rs){
  const si=scoreIndicator;
  // 加速度 40%
  const accel=(
    si(ind.rev_accel_pp,        15,3,-10)  *0.15+
    si(ind.eps_accel_pp,        30,5,-20)  *0.15+
    si(ind.gm_expansion,        5,1,-3)    *0.15+
    si(ind.fcf_accel,           20,-20,-100)*0.30+
    si(ind.fcf_yoy,             100,20,-30)*0.15+
    si(ind.fcf_cagr,            30,10,0)   *0.10
  );
  // 质量 25%
  const quality=(
    si(ind.fcf_conv,   100,70,30)*0.40+
    si(ind.gross_margin,70,30,10)*0.30+
    si(ind.op_margin,  30,10,0) *0.30
  );
  // 资本行动 25% (RS only for web)
  const rs3=rs&&rs.rs_3m!=null?rs.rs_3m:null;
  const rs6=rs&&rs.rs_6m!=null?rs.rs_6m:null;
  const capital=(
    si(rs3,30,0,-20)*0.50+
    si(rs6,50,0,-30)*0.50
  );
  // 预期 10%
  const expect=(
    si(ind.surprise_pct,   15,3,-3) *0.40+
    si(ind.surprise_streak,4,2,0)   *0.30+
    si(ind.analyst_bull,   90,60,30)*0.30
  );
  const overall=accel*0.40+quality*0.25+capital*0.25+expect*0.10;
  return {
    overall:Math.round(overall*10)/10,
    accel:Math.round(accel*10)/10,
    quality:Math.round(quality*10)/10,
    capital:Math.round(capital*10)/10,
    expect:Math.round(expect*10)/10
  };
}

async function fetchAndScoreTicker(tick){
  const key=FINNHUB_KEY;
  const base='https://finnhub.io/api/v1';
  setMsg('正在拉取 '+tick+' 数据…');
  try{
    const [mRes,eRes,rRes]=await Promise.all([
      fetch(base+'/stock/metric?symbol='+tick+'&metric=all&token='+key).then(r=>r.json()),
      fetch(base+'/stock/earnings?symbol='+tick+'&token='+key).then(r=>r.json()),
      fetch(base+'/stock/recommendation?symbol='+tick+'&token='+key).then(r=>r.json()),
    ]);
    const m=mRes.metric||{};
    // 提取关键指标
    const ind={
      rev_accel_pp:   m.revenueGrowthQuarterlyYoy!=null&&m.revenueGrowthTTMYoy!=null
                      ?(m.revenueGrowthQuarterlyYoy-m.revenueGrowthTTMYoy)*100:null,
      eps_accel_pp:   m.epsGrowthQuarterlyYoy!=null&&m.epsGrowthTTMYoy!=null
                      ?(m.epsGrowthQuarterlyYoy-m.epsGrowthTTMYoy)*100:null,
      gm_expansion:   m.grossMarginTTM!=null&&m.grossMargin5Y!=null
                      ?m.grossMarginTTM-m.grossMargin5Y:null,
      fcf_accel:      null,
      fcf_yoy:        null,
      fcf_cagr:       null,
      fcf_conv:       null,
      gross_margin:   m.grossMarginTTM??null,
      op_margin:      m.operatingMarginTTM??null,
      surprise_pct:   Array.isArray(eRes)&&eRes.length>0?eRes[0].surprisePercent??null:null,
      surprise_streak:Array.isArray(eRes)?eRes.filter(e=>e.surprisePercent>0).length:null,
      analyst_bull:   (()=>{
        if(!Array.isArray(rRes)||!rRes.length) return null;
        const r0=rRes[0];
        const total=(r0.buy||0)+(r0.hold||0)+(r0.sell||0)+(r0.strongBuy||0)+(r0.strongSell||0);
        return total>0?((r0.buy||0)+(r0.strongBuy||0))/total*100:null;
      })(),
      fcf_ttm_m: m.freeCashFlowTTM??null,
      gross_margin_pct: m.grossMarginTTM??null,
      op_margin_pct: m.operatingMarginTTM??null,
    };

    const scores=calcScores(ind,null);
    const mc=m.marketCapitalization?m.marketCapitalization*1e6:null;

    // 判断数据质量
    const validCount=[ind.gross_margin,ind.op_margin,ind.surprise_pct,
                      ind.surprise_streak,ind.analyst_bull,ind.rev_accel_pp]
                     .filter(v=>v!=null).length;
    const dq=validCount>=5?'high':validCount>=3?'medium':'low';

    const stockData={
      ticker:tick, name:'', sector:'', market_cap:mc,
      scores:scores,
      indicators:{
        rev_accel_pp:ind.rev_accel_pp, eps_accel_pp:ind.eps_accel_pp,
        gross_margin_expansion_pp:ind.gm_expansion,
        fcf_growth_accel_pp:null, fcf_growth_yoy_pct:null, fcf_cagr_3y_pct:null,
        fcf_conversion_pct:null,
        gross_margin_pct:ind.gross_margin, op_margin_pct:ind.op_margin,
        earnings_surprise_pct:ind.surprise_pct, surprise_streak:ind.surprise_streak,
        estimate_revision_ratio_pct:ind.analyst_bull, fcf_ttm_m:ind.fcf_ttm_m
      },
      rs:{}, data_quality:dq, risk_flags:[], in_scan:false,
      fetched_at:new Date().toISOString()
    };

    // 存到 localStorage
    const saved=loadWLScores();
    saved[tick]=stockData;
    saveWLScores(saved);
    scoreMap[tick]=stockData;

    setMsg(tick+' 评分完成: '+scores.overall.toFixed(1)+' 分 ✓');
    renderModalList();buildWLBar();render();
  }catch(e){
    setMsg('拉取 '+tick+' 失败，请检查代码是否有效');
    console.error(e);
  }
}

function addTicker(){
  const input=document.getElementById('modal-input');
  const tick=(input.value||'').trim().toUpperCase();
  if(!tick)return;
  if(wlTickers.includes(tick)){setMsg(tick+' 已存在');return;}
  wlTickers=[...wlTickers,tick];saveWL();input.value='';
  renderModalList();buildWLBar();render();
  // 实时拉取评分
  fetchAndScoreTicker(tick);
}

function deleteTicker(tick){
  wlTickers=wlTickers.filter(function(t){return t!==tick;});saveWL();
  renderModalList();buildWLBar();render();setMsg('已删除 '+tick);
}

function setMsg(msg){
  const el=document.getElementById('modal-msg');el.textContent=msg;
  setTimeout(function(){el.textContent='';},3000);
}

function openExplain(key){
  explainTarget=key;
  document.getElementById('exp-overlay').classList.add('open');
  if(explainUnlocked){showExplainContent(key);}
  else{
    document.getElementById('exp-lock').style.display='block';
    document.getElementById('exp-content').style.display='none';
    setTimeout(function(){document.getElementById('exp-pwd').focus();},100);
  }
}

function closeExplain(){document.getElementById('exp-overlay').classList.remove('open');}
function closeExplainOutside(e){if(e.target===document.getElementById('exp-overlay'))closeExplain();}

function checkPwd(){
  const pwd=document.getElementById('exp-pwd').value;
  if(pwd===EXPLAIN_PWD){
    explainUnlocked=true;
    document.getElementById('exp-pwd').value='';
    document.getElementById('exp-err').textContent='';
    showExplainContent(explainTarget);
  }else{
    document.getElementById('exp-err').textContent='密码错误，请重试';
    document.getElementById('exp-pwd').value='';
    document.getElementById('exp-pwd').focus();
  }
}

function showExplainContent(key){
  document.getElementById('exp-lock').style.display='none';
  const content=document.getElementById('exp-content');
  content.style.display='block';
  const data=EXPLAIN_DATA[key];
  if(!data){content.innerHTML='<p style="color:var(--ink3);padding:20px">暂无说明</p>';return;}
  let html='<div class="exp-dim-title">'+data.title+'</div>'+
    '<div class="exp-dim-sub">'+data.sub+'</div>';
  data.inds.forEach(function(ind){
    const wtHtml=ind.weight?'<span class="exp-ind-hd-wt">维度内权重 '+ind.weight+'</span>':'';
    let scoreHtml='';
    if(ind.scoring){
      scoreHtml='<table class="exp-tbl"><tr><th>数值</th><th>得分</th></tr>'+
        ind.scoring.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('')+
        '</table>';
    }
    html+='<div class="exp-ind">'+
      '<div class="exp-ind-hd"><span class="exp-ind-hd-name">'+ind.name+'</span>'+wtHtml+'</div>'+
      '<div class="exp-ind-body">'+
        '<b>计算公式：</b><code class="exp-formula">'+ind.formula+'</code>'+
        '<b>含义：</b>'+ind.desc+'<br><br>'+
        '<b>打分规则（线性插值）：</b>'+scoreHtml+
      '</div></div>';
  });
  content.innerHTML=html;
}

document.getElementById('js-date').textContent=UPDATED_AT;
document.getElementById('js-univ').textContent=UNIV_SIZE;
document.getElementById('js-ver').textContent=VERSION;
buildFilters();buildWLBar();buildDroppedBar();render();

</script>
