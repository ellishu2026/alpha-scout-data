<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alpha Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --white:      #ffffff;
  --ink:        #111111;
  --ink2:       #555555;
  --ink3:       #999999;
  --ink4:       #cccccc;
  --rule:       #e8e8e4;
  --rule2:      #f2f2ef;
  --row-alt:    #fafaf8;
  --row-hover:  #f4f3ef;
  --row-exp:    #f8f7f3;
  --pill-bg:    #f2f2ef;
  --pill-act:   #1a1a1a;

  --c90: #16a34a;
  --c80: #2563eb;
  --c70: #d97706;
  --c60: #dc2626;

  --bar-90: #22c55e;
  --bar-80: #3b82f6;
  --bar-70: #f59e0b;
  --bar-60: #ef4444;

  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-mono:  'DM Mono', 'Menlo', monospace;
  --radius-pill: 20px;
  --radius-sm:   4px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  background: var(--white);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── 页眉 ── */
header {
  border-bottom: 2px solid var(--ink);
  padding: 20px 32px 16px;
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-family: var(--font-serif);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.3px;
  line-height: 1;
  margin-right: 16px;
}
.logo em { font-style:normal; color: var(--c80); }
.header-meta {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: baseline;
  margin-left: auto;
  font-size: 10.5px;
  color: var(--ink3);
}
.header-meta b { color: var(--ink); font-weight:500; }

/* ── 图例 + 筛选容器 ── */
.toolbar {
  border-bottom: 1px solid var(--rule);
  padding: 10px 32px 0;
}

/* 图例行 */
.legend {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 10px;
  font-size: 11px;
  color: var(--ink2);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* 筛选 pill 行 */
.filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding-bottom: 12px;
}
.pill {
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 5px 16px;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--rule);
  background: var(--pill-bg);
  color: var(--ink2);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
  font-weight: 400;
}
.pill:hover { border-color: var(--ink3); color: var(--ink); }
.pill.active {
  background: var(--pill-act);
  border-color: var(--pill-act);
  color: #fff;
  font-weight: 500;
}

/* ── 自选股条 ── */
#wl-bar {
  border-bottom: 1px solid var(--rule);
  padding: 10px 32px;
  background: var(--row-alt);
  display: none;
}
.wl-label {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--ink4);
  margin-bottom: 7px;
}
.wl-chips { display:flex; gap:6px; flex-wrap:wrap; }
.wl-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--rule);
  padding: 4px 12px;
  background: var(--white);
  border-radius: var(--radius-pill);
  cursor: pointer;
  transition: border-color .1s;
  font-size: 11.5px;
}
.wl-chip:hover { border-color: var(--ink3); }
.wl-chip.dim  { opacity:.4; cursor:default; }
.wl-tick  { font-weight:500; color:var(--ink); }
.wl-score { font-weight:500; }

/* ── 表格 ── */
.table-wrap { overflow-x:auto; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
}
thead th {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--ink3);
  font-weight: 400;
  padding: 9px 14px 8px;
  border-bottom: 1px solid var(--rule);
  text-align: left;
  white-space: nowrap;
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 2;
}
thead th.r { text-align:right; }

tbody tr.stock-row {
  border-bottom: 1px solid var(--rule2);
  cursor: pointer;
  transition: background .08s;
}
tbody tr.stock-row:nth-child(4n+1),
tbody tr.stock-row:nth-child(4n+2) { background: var(--row-alt); }
tbody tr.stock-row:hover   { background: var(--row-hover) !important; }
tbody tr.stock-row.is-wl   { border-left: 2px solid var(--c80); }
tbody tr.stock-row.expanded { background: var(--row-exp) !important; }

td {
  padding: 8px 14px;
  vertical-align: middle;
  white-space: nowrap;
}
.td-rank  { color:var(--ink4); font-size:11px; width:32px; text-align:right; padding-right:6px; }
.td-ticker { font-weight:500; font-size:13px; color:var(--ink); width:64px; }
.wl-mark  {
  display:inline-block; width:4px; height:4px; border-radius:50%;
  background:var(--c80); margin-right:5px; vertical-align:middle; margin-bottom:2px;
}
.td-name   { color:var(--ink2); font-size:11.5px; max-width:200px; overflow:hidden; text-overflow:ellipsis; }

/* 板块徽章 */
.sector-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  font-weight: 500;
  letter-spacing: .02em;
  white-space: nowrap;
}
.sb-科技 { background:#eff6ff; color:#1d4ed8; }
.sb-医疗 { background:#f0fdf4; color:#15803d; }
.sb-金融 { background:#fff7ed; color:#c2410c; }
.sb-消费 { background:#fdf4ff; color:#7e22ce; }
.sb-工业 { background:#f8fafc; color:#475569; }
.sb-公用 { background:#ecfdf5; color:#065f46; }
.sb-能源 { background:#fefce8; color:#854d0e; }
.sb-地产 { background:#fff1f2; color:#9f1239; }
.sb-材料 { background:#f0fdfa; color:#0f766e; }
.sb-通信 { background:#faf5ff; color:#6b21a8; }
.sb-其他 { background:#f9fafb; color:#6b7280; }

/* ── 分数格 ── */
.td-score { text-align:right; padding-right:16px; }
.score-wrap {
  display:inline-flex; align-items:center; gap:7px; justify-content:flex-end;
}
.sval {
  font-size:12.5px; font-weight:500;
  min-width:36px; text-align:right; letter-spacing:-.2px;
}
.sbar {
  width:40px; height:2px;
  background:var(--rule); border-radius:1px; overflow:hidden; flex-shrink:0;
}
.sbar-fill {
  height:100%; border-radius:1px; width:0;
  transition: width .7s cubic-bezier(.16,1,.3,1);
}

/* 分数颜色 (≥90 / ≥80 / ≥70 / <70) */
.c90 { color:var(--c90); } .c90 .sbar-fill { background:var(--bar-90); }
.c80 { color:var(--c80); } .c80 .sbar-fill { background:var(--bar-80); }
.c70 { color:var(--c70); } .c70 .sbar-fill { background:var(--bar-70); }
.c60 { color:var(--c60); } .c60 .sbar-fill { background:var(--bar-60); }
.cna { color:var(--ink4); }

/* DQ 标签 */
.td-dq { text-align:right; }
.dq {
  display:inline-block; font-size:9px; text-transform:uppercase;
  letter-spacing:.06em; padding:1px 5px; border-radius:3px;
  font-weight:500; border:1px solid transparent;
}
.dq-h { color:#15803d; border-color:#bbf7d0; background:#f0fdf4; }
.dq-m { color:#b45309; border-color:#fde68a; background:#fffbeb; }
.dq-l { color:#b91c1c; border-color:#fecaca; background:#fef2f2; }

/* 展开箭头 */
.td-arr { width:20px; text-align:right; padding-right:14px; }
.arr-icon {
  display:inline-block; font-size:8px; color:var(--ink4);
  transition:transform .18s; line-height:1;
}
tr.expanded .arr-icon { transform:rotate(90deg); color:var(--ink2); }

/* ── 展开详情 ── */
.detail-row { display:none; }
.detail-row.open { display:table-row; }
.detail-cell {
  padding: 0 14px 18px 58px;
  background: var(--row-exp);
  border-bottom: 1px solid var(--rule);
}
.ind-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(155px,1fr));
  gap:1px;
  background:var(--rule);
  border:1px solid var(--rule);
  margin-top:12px;
  max-width:860px;
}
.ind-card { background:var(--white); padding:10px 12px; }
.ind-label {
  font-size:9.5px; text-transform:uppercase; letter-spacing:.06em;
  color:var(--ink3); margin-bottom:4px;
}
.ind-val {
  font-size:17px; font-weight:300; letter-spacing:-.5px; line-height:1;
}
.ind-val.pos { color:var(--c90); }
.ind-val.neg { color:var(--c60); }
.ind-val.na  { color:var(--ink4); font-size:13px; }
.ind-sfx { font-size:10px; color:var(--ink3); margin-left:1px; }

/* ── 空态 ── */
#empty {
  padding:64px 32px; text-align:center; color:var(--ink4);
  font-size:11px; display:none;
  letter-spacing:.08em; text-transform:uppercase;
}

/* ── 页脚 ── */
footer {
  border-top:1px solid var(--rule);
  padding:14px 32px;
  font-size:10px; color:var(--ink4); letter-spacing:.04em;
}

/* ── 响应式 ── */
@media (max-width:640px) {
  header { padding:14px 16px 12px; }
  .toolbar { padding:10px 16px 0; }
  #wl-bar { padding:10px 16px; }
  .logo { font-size:20px; }
  .td-name { display:none; }
  td { padding:7px 8px; }
  thead th { padding:8px 8px 7px; }
  .detail-cell { padding-left:20px; }
  footer { padding:12px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Alpha<em>Scout</em></div>
  <div class="header-meta">
    <span>更新 <b id="js-date">—</b></span>
    <span>扫描 <b id="js-univ">—</b> 家</span>
    <span>展示 Top 50</span>
    <span style="color:var(--ink4)">市值 $5亿–$500亿</span>

</header>

<div class="toolbar">
  <!-- 图例行 -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--bar-90)"></div>
      <span>≥90 卓越</span>

    <div class="legend-item">
      <div class="legend-dot" style="background:var(--bar-80)"></div>
      <span>≥80 优秀</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--bar-70)"></div>
      <span>≥70 良好</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--bar-60)"></div>
      <span>&lt;70 偏弱</span>
    </div>
  </div>
  <!-- 板块筛选行 -->
  <div class="filter-row" id="filter-row">
    <button class="pill active" data-s="ALL" onclick="setFilter('ALL')">全部</button>
  </div>
</div>

<div id="wl-bar">
  <div class="wl-label">自选股</div>
  <div class="wl-chips" id="wl-chips"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th class="r">#</th>
        <th>代码</th>
        <th>公司名称</th>
        <th>板块</th>
        <th class="r">综合分 ↓</th>
        <th class="r">加速度</th>
        <th class="r">质量</th>
        <th class="r">预期</th>
        <th class="r">数据</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">该板块暂无数据</div>
</div>

<footer>
  Alpha Scout v1.0 · 数据来源 Finnhub · 仅供参考，不构成投资建议
</footer>

const IND_META   = [["rev_accel_pp", "营收加速度", "pp"], ["eps_accel_pp", "EPS 加速度", "pp"], ["gross_margin_expansion_pp", "毛利率扩张", "pp"], ["fcf_growth_accel_pp", "FCF 加速度", "pp"], ["fcf_growth_yoy_pct", "FCF 增速 YoY", "%"], ["fcf_cagr_3y_pct", "FCF CAGR 3Y", "%"], ["fcf_conversion_pct", "FCF 转化率", "%"], ["gross_margin_pct", "毛利率", "%"], ["op_margin_pct", "营业利润率", "%"], ["earnings_surprise_pct", "业绩超预期", "%"], ["surprise_streak", "超预期连续", "Q"], ["estimate_revision_ratio_pct", "分析师看多比", "%"]];
const UPDATED_AT = "2026-05-24";
const UNIV_SIZE  = 500;

/* ── 分数颜色 ── */
function cls(v) {
  if (v == null) return 'cna';
  if (v >= 90)   return 'c90';
  if (v >= 80)   return 'c80';
  if (v >= 70)   return 'c70';
  return 'c60';
}

function scoreCell(v) {
  const c   = cls(v);
  const pct = v != null ? Math.min(100, Math.max(0, +v)) : 0;
  const txt = v != null ? (+v).toFixed(1) : '—';
  return `<div class="score-wrap ${c}">
    <div class="sbar"><div class="sbar-fill" data-pct="${pct}"></div></div>
    <span class="sval">${txt}</span>
  </div>`;
}

function dqBadge(dq) {
  if (!dq || dq === 'low')  return '<span class="dq dq-l">low</span>';
  if (dq === 'medium')       return '<span class="dq dq-m">mid</span>';
  return '<span class="dq dq-h">high</span>';
}

function fmtRaw(v, suffix) {
  if (v == null) return null;
  return suffix === 'Q' ? String(Math.round(+v)) : (+v).toFixed(1);
}

/* ── 状态 ── */
let activeSector = 'ALL';
let expandedTick = null;

/* ── 详情格 ── */
function detailHtml(s) {
  const ind = s.indicators || {};
  const cards = IND_META.map(([key, label, sfx]) => {
    const raw = ind[key];
    const fv  = fmtRaw(raw, sfx);
    let vc = 'na', display = 'N/A', sfxHtml = '';
    if (fv !== null) {
      const n = +raw;
      vc = n > 0.001 ? 'pos' : (n < -0.001 ? 'neg' : '');
      display = fv;
      sfxHtml = `<span class="ind-sfx">${sfx}</span>`;
    }
    return `<div class="ind-card">
      <div class="ind-label">${label}</div>
      <div class="ind-val ${vc}">${display}${sfxHtml}</div>
    </div>`;
  }).join('');
  return `<div class="ind-grid">${cards}</div>`;
}

/* ── 渲染(默认按综合分降序) ── */
function render() {
  const tbody = document.getElementById('tbody');
  let list = activeSector === 'ALL'
    ? [...STOCKS]
    : STOCKS.filter(s => s.cn_sector === activeSector);

  // 按综合分降序,更新显示排名
  list.sort((a, b) => (b.scores?.overall ?? 0) - (a.scores?.overall ?? 0));

  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  tbody.innerHTML = '';

  list.forEach((s, i) => {
    const sc   = s.scores || {};
    const isWL = WL_TICKERS.has((s.ticker || '').toUpperCase());
    const isExp = expandedTick === s.ticker;
    const sec  = s.cn_sector || '其他';

    const tr = document.createElement('tr');
    tr.className = 'stock-row' + (isWL ? ' is-wl' : '') + (isExp ? ' expanded' : '');
    tr.dataset.ticker = s.ticker;
    tr.innerHTML = `
      <td class="td-rank">${i + 1}</td>
      <td class="td-ticker">${isWL ? '<span class="wl-mark"></span>' : ''}<span>${s.ticker}</span></td>
      <td class="td-name" title="${s.name || ''}">${(s.name || '').substring(0, 28)}</td>
      <td><span class="sector-badge sb-${sec}">${sec}</span></td>
      <td class="td-score">${scoreCell(sc.overall)}</td>
      <td class="td-score">${scoreCell(sc.accel)}</td>
      <td class="td-score">${scoreCell(sc.quality)}</td>
      <td class="td-score">${scoreCell(sc.expect)}</td>
      <td class="td-dq">${dqBadge(s.data_quality)}</td>
      <td class="td-arr"><span class="arr-icon">▶</span></td>
    `;
    tr.addEventListener('click', () => toggle(s.ticker));
    tbody.appendChild(tr);

    const dr = document.createElement('tr');
    dr.className = 'detail-row' + (isExp ? ' open' : '');
    dr.dataset.ticker = s.ticker;
    const dc = document.createElement('td');
    dc.className = 'detail-cell';
    dc.colSpan = 10;
    if (isExp) dc.innerHTML = detailHtml(s);
    dr.appendChild(dc);
    tbody.appendChild(dr);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.sbar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

function toggle(ticker) {
  expandedTick = expandedTick === ticker ? null : ticker;
  render();
  if (expandedTick) setTimeout(() => {
    const el = document.querySelector(`tr.expanded[data-ticker="${ticker}"]`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 40);
}

/* ── 板块 pill ── */
function setFilter(s) {
  activeSector = s;
  expandedTick = null;
  document.querySelectorAll('.pill').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.s === s));
  render();
}

function buildFilters() {
  const row = document.getElementById('filter-row');
  SECTORS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.s = s;
    btn.textContent = s;
    btn.onclick = () => setFilter(s);
    row.appendChild(btn);
  });
}

/* ── 自选股 ── */
function buildWatchlist() {
  if (!WL_TICKERS.size) return;
  document.getElementById('wl-bar').style.display = 'block';
  const lookup = Object.fromEntries(STOCKS.map(s => [s.ticker, s]));
  const container = document.getElementById('wl-chips');
  [...WL_TICKERS].sort().forEach(tick => {
    const s  = lookup[tick];
    const ov = s?.scores?.overall;
    const chip = document.createElement('div');
    chip.className = 'wl-chip' + (s ? '' : ' dim');
    chip.innerHTML = `
      <span class="wl-tick">${tick}</span>
      <span class="wl-score ${cls(ov)}">${ov != null ? (+ov).toFixed(1) : '—'}</span>
    `;
    if (s) chip.onclick = () => toggle(tick);
    container.appendChild(chip);
  });
}

/* ── 初始化 ── */
document.getElementById('js-date').textContent = UPDATED_AT;
document.getElementById('js-univ').textContent = UNIV_SIZE;
buildFilters();
buildWatchlist();
render();
</script>
</body>
</html>
