<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AlphaScout">
<meta name="theme-color" content="#ffffff">
<title>AlphaScout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>

:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --ink: #1a1a1a;
  --ink2: #666666;
  --ink3: #999999;
  --ink4: #cccccc;
  --rule: #e8e8e8;
  --nav-h: 60px;
  --header-h: 52px;
  --c90: #16a34a; --c80: #2563eb; --c70: #d97706; --c60: #dc2626;
  --bar-90: #22c55e; --bar-80: #3b82f6; --bar-70: #f59e0b; --bar-60: #ef4444;
  --font: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', monospace;
  --blue: #2563eb;
  --radius: 12px;
  --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── Header ── */
.app-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 8px;
}
.app-logo {
  font-size: 18px; font-weight: 700; color: var(--ink);
  letter-spacing: -.3px;
}
.app-logo em { font-style: normal; color: var(--blue); }
.app-meta {
  margin-left: auto;
  font-size: 11px; color: var(--ink3);
  text-align: right; line-height: 1.3;
}
.app-ver {
  display: inline-block;
  font-size: 10px; color: var(--ink4);
  border: 1px solid var(--rule);
  padding: 1px 6px; border-radius: 4px;
  margin-left: 6px;
}

/* ── Scroll body ── */
.app-body {
  padding-top: var(--header-h);
  padding-bottom: calc(var(--nav-h) + 8px);
  min-height: 100vh;
  max-width: 680px;
  margin: 0 auto;
}

/* ── Filter pills ── */
.filter-wrap {
  position: sticky; top: var(--header-h); z-index: 90;
  background: rgba(245,245,247,0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 10px 0 8px;
}
.filter-scroll {
  display: flex; gap: 6px;
  overflow-x: auto; padding: 0 16px;
  scrollbar-width: none;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  border: 1.5px solid var(--rule);
  background: var(--card);
  color: var(--ink2);
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.pill.active {
  background: var(--ink); border-color: var(--ink); color: #fff;
}
.pill-wl.active { background: var(--ink); border-color: var(--ink); color: #fff; }

/* ── Dropped banner ── */
.dropped-bar {
  margin: 8px 16px 0;
  background: #fef9ec; border: 1px solid #fde68a;
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px; color: #92400e;
  display: none;
}

/* ── Legend ── */
.legend {
  display: flex; gap: 12px; padding: 8px 16px 4px;
  flex-wrap: wrap;
}
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--ink3); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Watchlist chips ── */
.wl-section { padding: 4px 16px 0; }
.wl-label { font-size: 11px; color: var(--ink4); text-transform: uppercase;
            letter-spacing: .08em; margin-bottom: 6px; }
.wl-chips { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 4px; }
.wl-chip {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--rule);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.wl-chip.dim { opacity: .4; }
.wl-tick { font-weight: 600; color: var(--ink); }
.wl-mgr { margin-left: auto; flex-shrink: 0;
          font-size: 11px; color: var(--ink3);
          background: var(--card); border: 1px solid var(--rule);
          border-radius: 20px; padding: 3px 10px; cursor: pointer; }

/* ── Stock cards ── */
.cards { padding: 6px 12px 0; display: flex; flex-direction: column; gap: 6px; }
.stock-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s;
  active-scale: .98;
}
.stock-card:active { transform: scale(.98); }
.card-top { display: flex; align-items: flex-start; gap: 10px; }
.card-rank { font-size: 12px; color: var(--ink4); min-width: 20px; margin-top: 2px; }
.card-info { flex: 1; min-width: 0; }
.card-ticker { font-size: 15px; font-weight: 700; color: var(--ink); }
.card-name { font-size: 12px; color: var(--ink3); margin-top: 1px;
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-badges { display: flex; gap: 4px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
.sbadge {
  font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500;
}
.sb-科技{background:#eff6ff;color:#1d4ed8} .sb-医疗{background:#f0fdf4;color:#15803d}
.sb-金融{background:#fff7ed;color:#c2410c} .sb-消费{background:#fdf4ff;color:#7e22ce}
.sb-工业{background:#f8fafc;color:#475569} .sb-公用{background:#ecfdf5;color:#065f46}
.sb-能源{background:#fefce8;color:#854d0e} .sb-地产{background:#fff1f2;color:#9f1239}
.sb-材料{background:#f0fdfa;color:#0f766e} .sb-通信{background:#faf5ff;color:#6b21a8}
.sb-其他{background:#f9fafb;color:#6b7280}
.chg-badge { font-size: 10px; font-weight: 600; }
.chg-new { color: var(--c90); } .chg-up { color: var(--blue); }
.chg-dn { color: var(--c60); } .chg-flat { color: var(--ink4); }
.dq { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 500; }
.dq-h { color:#15803d; background:#f0fdf4; }
.dq-m { color:#b45309; background:#fffbeb; }
.dq-l { color:#b91c1c; background:#fef2f2; }
.card-score { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.score-big { font-size: 22px; font-weight: 700; line-height: 1; font-family: var(--font-mono); }
.score-label { font-size: 10px; color: var(--ink3); margin-top: 2px; }
.card-dims {
  display: flex; gap: 0;
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--rule);
}
.dim-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 0 2px;
}
.dim-item:not(:last-child) { border-right: 1px solid var(--rule); }
.dim-val { font-size: 13px; font-weight: 700; font-family: var(--font-mono); }
.dim-label { font-size: 9px; color: var(--ink3); }
.dim-bar {
  width: 80%; height: 3px; border-radius: 2px;
  background: var(--rule); overflow: hidden;
}
.dim-fill { height: 100%; border-radius: 2px; width: 0; transition: width .6s ease; }
.card-extra {
  display: flex; gap: 0;
  margin-top: 6px; padding-top: 6px;
  border-top: 1px solid var(--rule);
  font-size: 11px;
}
.extra-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 1px;
}
.extra-item:not(:last-child) { border-right: 1px solid var(--rule); }
.extra-label { color: var(--ink3); font-size: 9px; text-transform: uppercase; }
.extra-val { color: var(--ink); font-weight: 600; font-size: 12px; }
.extra-val.pos { color: var(--c90); } .extra-val.neg { color: var(--c60); }

/* ── 详情抽屉 ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.4);
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,0,.67,0);
  padding-bottom: calc(var(--nav-h) + 16px);
}
.drawer.open { transform: translateY(0); }
.drawer-handle {
  width: 36px; height: 4px; background: var(--ink4);
  border-radius: 2px; margin: 12px auto 16px;
}
.drawer-header { padding: 0 20px 12px; border-bottom: 1px solid var(--rule); }
.drawer-ticker { font-size: 22px; font-weight: 700; color: var(--ink); }
.drawer-name { font-size: 13px; color: var(--ink3); margin-top: 2px; }
.drawer-score-row {
  display: flex; gap: 0;
  padding: 12px 20px; border-bottom: 1px solid var(--rule);
}
.drawer-dim {
  flex: 1; text-align: center;
  padding: 0 4px;
  border-right: 1px solid var(--rule);
}
.drawer-dim:last-child { border-right: none; }
.drawer-dim-val { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.drawer-dim-label { font-size: 10px; color: var(--ink3); margin-top: 2px; }
.drawer-section { padding: 14px 20px 0; }
.drawer-section-title {
  font-size: 12px; font-weight: 600; color: var(--ink3);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 10px;
}
.ind-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
}
.ind-card {
  background: var(--bg); border-radius: var(--radius-sm);
  padding: 10px 12px; cursor: pointer;
}
.ind-label { font-size: 10px; color: var(--ink3); margin-bottom: 4px;
             text-transform: uppercase; letter-spacing: .04em; }
.ind-val { font-size: 18px; font-weight: 300; line-height: 1; }
.ind-val.pos { color: var(--c90); } .ind-val.neg { color: var(--c60); }
.ind-val.na { color: var(--ink4); font-size: 14px; }
.ind-sfx { font-size: 11px; color: var(--ink3); }
.rs-row {
  background: var(--bg); border-radius: var(--radius-sm);
  padding: 10px 12px; margin-bottom: 8px;
  display: flex; gap: 16px;
}
.rs-item { flex: 1; }
.rs-label { font-size: 10px; color: var(--ink3); margin-bottom: 3px; }
.rs-val { font-size: 15px; font-weight: 600; }
.rs-val.pos { color: var(--c90); } .rs-val.neg { color: var(--c60); }

/* ── 字段解释抽屉 ── */
.exp-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.5);
}
.exp-overlay.open { display: block; }
.exp-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  max-height: 80vh; overflow-y: auto;
  padding: 0 0 32px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,0,.67,0);
}
.exp-drawer.open { transform: translateY(0); }
.exp-handle { width: 36px; height: 4px; background: var(--ink4);
              border-radius: 2px; margin: 12px auto 0; }
.exp-lock { text-align: center; padding: 24px 20px; }
.exp-lock-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.exp-lock p { font-size: 13px; color: var(--ink3); margin-bottom: 16px; }
.exp-lock input {
  width: 100%; border: 1.5px solid var(--rule); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 16px; text-align: center;
  letter-spacing: .2em; outline: none; margin-bottom: 10px;
}
.exp-lock input:focus { border-color: var(--blue); }
.exp-lock button {
  width: 100%; padding: 13px; background: var(--ink); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 15px;
  font-weight: 600; cursor: pointer;
}
.exp-err { font-size: 12px; color: var(--c60); margin-top: 8px; }
.exp-content { padding: 16px 20px; display: none; }
.exp-dim-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.exp-dim-sub { font-size: 13px; color: var(--ink3); margin-bottom: 14px; }
.exp-ind { background: var(--bg); border-radius: var(--radius-sm);
           margin-bottom: 10px; overflow: hidden; }
.exp-ind-hd { padding: 10px 14px; display: flex; justify-content: space-between;
              align-items: center; border-bottom: 1px solid var(--rule); }
.exp-ind-name { font-size: 13px; font-weight: 600; }
.exp-ind-wt { font-size: 11px; color: var(--ink3); }
.exp-ind-body { padding: 10px 14px; font-size: 13px; color: var(--ink2); line-height: 1.6; }
.exp-formula { font-family: var(--font-mono); font-size: 12px; background: var(--card);
               border-radius: 6px; padding: 6px 10px; margin: 6px 0; display: block; }
.exp-tbl { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
.exp-tbl th { text-align: left; color: var(--ink3); font-weight: 400;
              padding: 3px 6px; border-bottom: 1px solid var(--rule); }
.exp-tbl td { padding: 3px 6px; }

/* ── 自选股管理抽屉 ── */
.wl-drawer-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.5);
}
.wl-drawer-overlay.open { display: block; }
.wl-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
  background: var(--card);
  border-radius: 20px 20px 0 0;
  max-height: 80vh; overflow-y: auto;
  padding: 0 0 32px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,0,.67,0);
}
.wl-drawer.open { transform: translateY(0); }
.wl-drawer-handle { width: 36px; height: 4px; background: var(--ink4);
                    border-radius: 2px; margin: 12px auto 0; }
.wl-drawer-body { padding: 16px 20px; }
.wl-drawer-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
.wl-item { display: flex; align-items: center; gap: 10px;
           padding: 12px 0; border-bottom: 1px solid var(--rule); }
.wl-item-tick { font-size: 15px; font-weight: 600; flex: 1; }
.wl-item-score { font-size: 14px; font-weight: 600; min-width: 40px; text-align: right; }
.wl-del { background: #fef2f2; color: var(--c60); border: none; border-radius: 6px;
          padding: 5px 10px; font-size: 12px; cursor: pointer; }
.wl-add-row { display: flex; gap: 8px; margin-top: 14px; }
.wl-input {
  flex: 1; border: 1.5px solid var(--rule); border-radius: var(--radius-sm);
  padding: 11px 14px; font-size: 15px; outline: none;
}
.wl-input:focus { border-color: var(--blue); }
.wl-add-btn {
  background: var(--ink); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 11px 18px;
  font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.wl-msg { font-size: 12px; color: var(--ink3); margin-top: 8px; min-height: 16px; }

/* ── Empty ── */
#empty { padding: 60px 16px; text-align: center; color: var(--ink4);
         font-size: 13px; display: none; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-h);
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--rule);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; color: var(--ink4);
  -webkit-tap-highlight-color: transparent;
  transition: color .15s;
}
.nav-item.active { color: var(--blue); }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; }

</style>
</head>
<body>
<header class="app-header">
  <div class="app-logo">Alpha<em>Scout</em></div>
  <div class="app-meta">
    <div>更新 <b id="js-date">—</b></div>
    <div>扫描 <b id="js-univ">—</b> 家 <span class="app-ver" id="js-ver">v2.0</span></div>
  </div>
</header>
<div class="app-body">
  <div class="filter-wrap">
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--bar-90)"></div>≥90 卓越</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--bar-80)"></div>≥80 优秀</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--bar-70)"></div>≥70 良好</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--bar-60)"></div>&lt;70 偏弱</div>
    </div>
    <div class="filter-scroll" id="filter-scroll">
      <button class="pill active" data-s="ALL" onclick="setFilter('ALL')">全部</button>
    </div>
  </div>
  <div id="dropped-bar" class="dropped-bar"></div>
  <div class="wl-section" id="wl-section" style="display:none">
    <div style="display:flex;align-items:center;padding:0 16px;margin-bottom:6px">
      <span class="wl-label">自选股</span>
      <button class="wl-mgr" onclick="openWLDrawer()">管理</button>
    </div>
    <div class="wl-chips" id="wl-chips"></div>
  </div>
  <div class="cards" id="cards"></div>
  <div id="empty">该板块暂无数据</div>
</div>
<!-- 底部导航 -->
<nav class="bottom-nav">
  <div class="nav-item active" data-tab="ranking" onclick="switchTab('ranking')">
    <div class="nav-icon">&#128202;</div>
    <div class="nav-label">排行</div>
  </div>
  <div class="nav-item" data-tab="watchlist" onclick="switchTab('watchlist')">
    <div class="nav-icon">&#11088;</div>
    <div class="nav-label">自选</div>
  </div>
  <div class="nav-item" data-tab="search" onclick="openWLDrawer()">
    <div class="nav-icon">&#43;</div>
    <div class="nav-label">添加</div>
  </div>
</nav>
<!-- 详情抽屉 -->
<div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<div id="drawer" class="drawer"></div>
<!-- 字段解释抽屉 -->
<div id="exp-overlay" class="exp-overlay" onclick="closeExplain()"></div>
<div id="exp-drawer" class="exp-drawer">
  <div class="exp-handle"></div>
  <div id="exp-lock" style="display:block">
    <div class="exp-lock">
      <div class="exp-lock-title">字段说明</div>
      <p>请输入密码查看评分逻辑</p>
      <input type="password" id="exp-pwd" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')checkPwd()">
      <button onclick="checkPwd()">确认</button>
      <div class="exp-err" id="exp-err"></div>
    </div>
  </div>
  <div id="exp-content" class="exp-content"></div>
</div>
<!-- 自选股管理抽屉 -->
<div id="wl-drawer-overlay" class="wl-drawer-overlay" onclick="closeWLDrawer()"></div>
<div id="wl-drawer" class="wl-drawer">
  <div class="wl-drawer-handle"></div>
  <div class="wl-drawer-body">
    <div class="wl-drawer-title">管理自选股</div>
    <div id="wl-list"></div>
    <div class="wl-add-row">
      <input class="wl-input" id="wl-input" placeholder="输入股票代码 (如 TSLA)"
             onkeydown="if(event.key==='Enter')addTicker()">
      <button class="wl-add-btn" onclick="addTicker()">添加</button>
    </div>
    <div class="wl-msg" id="wl-msg"></div>
  </div>

function openDrawer(ticker){
  expandedTicker=ticker;
  var s=STOCKS.find(function(x){return x.ticker===ticker;})||scoreMap[ticker];
  if(!s)return;
  var sc=s.scores||{},rs=s.rs||{},ind=s.indicators||{};
  var el=document.getElementById('drawer');

  var rsHtml='';
  if(rs.rs_3m!=null||rs.rs_6m!=null){
    var r3=rs.rs_3m!=null?rs.rs_3m:null;
    var r6=rs.rs_6m!=null?rs.rs_6m:null;
    rsHtml='<div class="rs-row">'+
      (r3!=null?'<div class="rs-item"><div class="rs-label">RS 超额 3个月</div><div class="rs-val '+(r3>0?'pos':'neg')+'">'+(r3>0?'+':'')+r3.toFixed(1)+'%</div></div>':'')+
      (r6!=null?'<div class="rs-item"><div class="rs-label">RS 超额 6个月</div><div class="rs-val '+(r6>0?'pos':'neg')+'">'+(r6>0?'+':'')+r6.toFixed(1)+'%</div></div>':'')+
    '</div>';
  }

  var cards=IND_COLUMNS.map(function(key){
    var raw=ind[key],sfx=IND_SUFFIXES[key]||'',label=IND_LABELS[key]||key;
    var fv=fmtRaw(raw,sfx);
    var vc='na',display='N/A',sfxHtml='';
    if(fv!==null){var n=+raw;vc=n>0.001?'pos':(n<-0.001?'neg':'');display=fv;sfxHtml='<span class="ind-sfx">'+sfx+'</span>';}
    var dimKey=IND_TO_DIM[key]||'overall';
    return '<div class="ind-card" data-dim="'+dimKey+'" onclick="openExplain(this.dataset.dim)" title="查看说明">'+
      '<div class="ind-label">'+label+'</div>'+
      '<div class="ind-val '+vc+'">'+display+sfxHtml+'</div>'+
    '</div>';
  }).join('');

  el.innerHTML=
    '<div class="drawer-handle"></div>'+
    '<div class="drawer-header">'+
      '<div class="drawer-ticker">'+s.ticker+'</div>'+
      '<div class="drawer-name">'+(s.name||'')+'</div>'+
    '</div>'+
    '<div class="drawer-score-row">'+
      makeDrawerDim(sc.overall,'综合分','overall')+
      makeDrawerDim(sc.accel,'加速度(40%)','accel')+
      makeDrawerDim(sc.quality,'质量(25%)','quality')+
      makeDrawerDim(sc.capital,'资本(25%)','capital')+
      makeDrawerDim(sc.expect,'预期(10%)','expect')+
    '</div>'+
    '<div class="drawer-section">'+
      '<div class="drawer-section-title">资本行动信号</div>'+
      rsHtml+
    '</div>'+
    '<div class="drawer-section">'+
      '<div class="drawer-section-title">12个底层指标（点击查看说明）</div>'+
      '<div class="ind-grid">'+cards+'</div>'+
    '</div>';

  document.getElementById('drawer-overlay').classList.add('open');
  setTimeout(function(){el.classList.add('open');},10);
  setTimeout(function(){
    el.querySelectorAll('.dim-fill').forEach(function(x){x.style.width=x.dataset.pct+'%';});
  },100);
}

function makeDrawerDim(v,label,key){
  return '<div class="drawer-dim" data-dim="'+key+'" onclick="openExplain(this.dataset.dim)" style="cursor:pointer">'+
    '<div class="drawer-dim-val" style="color:'+clr(v)+'">'+fmtScore(v)+'</div>'+
    '<div class="drawer-dim-label">'+label+'</div>'+
  '</div>';
}

function closeDrawer(){
  var el=document.getElementById('drawer');
  el.classList.remove('open');
  setTimeout(function(){document.getElementById('drawer-overlay').classList.remove('open');},300);
}

// ── 字段解释 ──
function openExplain(key){
  explainTarget=key;
  document.getElementById('exp-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('exp-drawer').classList.add('open');},10);
  if(explainUnlocked){showExpContent(key);}
  else{
    document.getElementById('exp-lock').style.display='block';
    document.getElementById('exp-content').style.display='none';
    setTimeout(function(){document.getElementById('exp-pwd').focus();},300);
  }
}
function closeExplain(){
  var d=document.getElementById('exp-drawer');
  d.classList.remove('open');
  setTimeout(function(){document.getElementById('exp-overlay').classList.remove('open');},300);
}
function checkPwd(){
  var pwd=document.getElementById('exp-pwd').value;
  if(pwd===EXPLAIN_PWD){
    explainUnlocked=true;
    document.getElementById('exp-pwd').value='';
    document.getElementById('exp-err').textContent='';
    showExpContent(explainTarget);
  }else{
    document.getElementById('exp-err').textContent='密码错误，请重试';
    document.getElementById('exp-pwd').value='';
    document.getElementById('exp-pwd').focus();
  }
}
function showExpContent(key){
  document.getElementById('exp-lock').style.display='none';
  var content=document.getElementById('exp-content');
  content.style.display='block';
  var data=EXPLAIN_DATA[key];
  if(!data){content.innerHTML='<p style="color:var(--ink3)">暂无说明</p>';return;}
  var html='<div class="exp-dim-title">'+data.title+'</div>'+
    '<div class="exp-dim-sub">'+data.sub+'</div>';
  data.inds.forEach(function(ind){
    var wtHtml=ind.weight?'<span class="exp-ind-wt">'+ind.weight+'</span>':'';
    var scoreHtml='';
    if(ind.scoring){
      scoreHtml='<table class="exp-tbl"><tr><th>数值</th><th>得分</th></tr>'+
        ind.scoring.map(function(r){return'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>';}).join('')+
      '</table>';
    }
    html+='<div class="exp-ind">'+
      '<div class="exp-ind-hd"><span class="exp-ind-name">'+ind.name+'</span>'+wtHtml+'</div>'+
      '<div class="exp-ind-body">'+
        '<b>公式：</b><code class="exp-formula">'+ind.formula+'</code>'+
        ind.desc+'<br><br>'+scoreHtml+
      '</div></div>';
  });
  content.innerHTML=html;
}

// ── 自选股管理 ──
function openWLDrawer(){
  renderWLList();
  document.getElementById('wl-drawer-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('wl-drawer').classList.add('open');},10);
}
function closeWLDrawer(){
  var d=document.getElementById('wl-drawer');
  d.classList.remove('open');
  setTimeout(function(){document.getElementById('wl-drawer-overlay').classList.remove('open');},300);
}
function renderWLList(){
  var list=document.getElementById('wl-list');
  list.innerHTML='';
  wlTickers.forEach(function(tick){
    var s=scoreMap[tick],ov=s&&s.scores&&s.scores.overall;
    var div=document.createElement('div');
    div.className='wl-item';
    div.innerHTML='<span class="wl-item-tick">'+tick+'</span>'+
      '<span class="wl-item-score" style="color:'+clr(ov)+'">'+fmtScore(ov)+'</span>'+
      '<button class="wl-del" data-tick="'+tick+'" onclick="deleteTicker(this.dataset.tick)">删除</button>';
    list.appendChild(div);
  });
}
function saveWL(){localStorage.setItem(LS_KEY,JSON.stringify(wlTickers));}
function saveWLScores(scores){localStorage.setItem(LS_SCORES_KEY,JSON.stringify(scores));}
function loadWLScores(){try{var s=localStorage.getItem(LS_SCORES_KEY);if(s)return JSON.parse(s);}catch(e){}return{};}

function deleteTicker(tick){
  wlTickers=wlTickers.filter(function(t){return t!==tick;});saveWL();
  renderWLList();buildWLBar();render();setWLMsg('已删除 '+tick);
}
function addTicker(){
  var input=document.getElementById('wl-input');
  var tick=(input.value||'').trim().toUpperCase();
  if(!tick)return;
  if(wlTickers.includes(tick)){setWLMsg(tick+' 已存在');return;}
  wlTickers=[...wlTickers,tick];saveWL();input.value='';
  renderWLList();buildWLBar();render();
  fetchAndScore(tick);
}
function setWLMsg(msg){
  var el=document.getElementById('wl-msg');el.textContent=msg;
  setTimeout(function(){el.textContent='';},3000);
}

// ── 实时拉取评分 ──
function scoreInd(v,full,pass_,floor){
  if(v==null)return 50;
  if(v>=full)return 100;if(v<=floor)return 0;
  if(v>=pass_)return 50+50*(v-pass_)/(full-pass_);
  return 50*(v-floor)/(pass_-floor);
}
async function fetchAndScore(tick){
  setWLMsg('正在拉取 '+tick+' 数据…');
  try{
    var base='https://finnhub.io/api/v1';
    var [mRes,eRes,rRes]=await Promise.all([
      fetch(base+'/stock/metric?symbol='+tick+'&metric=all&token='+FINNHUB_KEY).then(function(r){return r.json();}),
      fetch(base+'/stock/earnings?symbol='+tick+'&token='+FINNHUB_KEY).then(function(r){return r.json();}),
      fetch(base+'/stock/recommendation?symbol='+tick+'&token='+FINNHUB_KEY).then(function(r){return r.json();}),
    ]);
    var m=mRes.metric||{};
    var si=scoreInd;
    var rev_accel=m.revenueGrowthQuarterlyYoy!=null&&m.revenueGrowthTTMYoy!=null?(m.revenueGrowthQuarterlyYoy-m.revenueGrowthTTMYoy)*100:null;
    var eps_accel=m.epsGrowthQuarterlyYoy!=null&&m.epsGrowthTTMYoy!=null?(m.epsGrowthQuarterlyYoy-m.epsGrowthTTMYoy)*100:null;
    var gm_exp=m.grossMarginTTM!=null&&m.grossMargin5Y!=null?m.grossMarginTTM-m.grossMargin5Y:null;
    var gross_m=m.grossMarginTTM??null,op_m=m.operatingMarginTTM??null;
    var surp=Array.isArray(eRes)&&eRes.length?eRes[0].surprisePercent??null:null;
    var streak=Array.isArray(eRes)?eRes.filter(function(e){return e.surprisePercent>0;}).length:null;
    var bull=(function(){if(!Array.isArray(rRes)||!rRes.length)return null;var r0=rRes[0];var tot=(r0.buy||0)+(r0.hold||0)+(r0.sell||0)+(r0.strongBuy||0)+(r0.strongSell||0);return tot>0?((r0.buy||0)+(r0.strongBuy||0))/tot*100:null;})();
    var accel=si(rev_accel,15,3,-10)*0.15+si(eps_accel,30,5,-20)*0.15+si(gm_exp,5,1,-3)*0.15+50*0.30+50*0.15+50*0.10;
    var quality=si(null,100,70,30)*0.40+si(gross_m,70,30,10)*0.30+si(op_m,30,10,0)*0.30;
    var capital=50;
    var expect=si(surp,15,3,-3)*0.40+si(streak,4,2,0)*0.30+si(bull,90,60,30)*0.30;
    var overall=accel*0.40+quality*0.25+capital*0.25+expect*0.10;
    var scores={overall:Math.round(overall*10)/10,accel:Math.round(accel*10)/10,quality:Math.round(quality*10)/10,capital:Math.round(capital*10)/10,expect:Math.round(expect*10)/10};
    var mc=m.marketCapitalization?m.marketCapitalization*1e6:null;
    var valid=[gross_m,op_m,surp,streak,bull,rev_accel].filter(function(v){return v!=null;}).length;
    var dq=valid>=5?'high':valid>=3?'medium':'low';
    var stockData={ticker:tick,name:'',sector:'',market_cap:mc,cn_sector:'其他',
      scores:scores,indicators:{rev_accel_pp:rev_accel,eps_accel_pp:eps_accel,
        gross_margin_expansion_pp:gm_exp,gross_margin_pct:gross_m,op_margin_pct:op_m,
        earnings_surprise_pct:surp,surprise_streak:streak,estimate_revision_ratio_pct:bull,
        fcf_ttm_m:m.freeCashFlowTTM??null},
      rs:{},data_quality:dq,risk_flags:[]};
    var saved=loadWLScores();saved[tick]=stockData;saveWLScores(saved);scoreMap[tick]=stockData;
    setWLMsg(tick+' 评分: '+scores.overall.toFixed(1)+' ✓');
    renderWLList();buildWLBar();render();
  }catch(e){setWLMsg('拉取失败，请检查代码');console.error(e);}
}

// ── 自选股横条 ──

function buildWLBar(){
  var wl=wlTickers.map(function(t){return scoreMap[t]||{ticker:t,scores:{overall:null}};});
  if(!wl.length)return;
  document.getElementById('wl-section').style.display='block';
  var chips=document.getElementById('wl-chips');
  chips.innerHTML='';
  wl.forEach(function(s){
    var ov=s.scores&&s.scores.overall;
    var chip=document.createElement('div');
    chip.className='wl-chip'+(ov==null?' dim':'');
    chip.innerHTML='<span class="wl-tick">'+s.ticker+'</span>'+
      '<span style="font-size:12px;font-weight:600;color:'+clr(ov)+'">'+fmtScore(ov)+'</span>';
    if(ov!=null)chip.addEventListener('click',function(){openDrawer(s.ticker);});
    chips.appendChild(chip);
  });
}

// ── 底部导航 ──
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.tab===tab);
  });
  if(tab==='ranking'){
    activeSector='ALL';
    document.querySelectorAll('.pill').forEach(function(p){
      p.classList.toggle('active',p.dataset.s==='ALL'||false);
    });
    var pw=document.getElementById('pill-wl');
    if(pw)pw.classList.remove('active');
  }else if(tab==='watchlist'){
    document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
    var pw=document.getElementById('pill-wl');
    if(pw)pw.classList.add('active');
  }
  render();
}

// ── 板块筛选 ──
function setFilter(s){
  activeSector=s;activeTab='ranking';
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active',el.dataset.tab==='ranking');
  });
  document.querySelectorAll('.pill').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.s===s);
  });
  render();
}
function buildFilters(){
  var row=document.getElementById('filter-scroll');
  SECTORS.forEach(function(s){
    var btn=document.createElement('button');
    btn.className='pill';btn.dataset.s=s;btn.textContent=s;
    btn.onclick=function(){setFilter(s);};row.appendChild(btn);
  });
  // 加"自选股"按钮，和板块 pill 同排
  var wlBtn=document.createElement('button');
  wlBtn.className='pill pill-wl';wlBtn.id='pill-wl';
  wlBtn.dataset.tab='watchlist';wlBtn.textContent='自选股';
  wlBtn.onclick=function(){switchTab('watchlist');};
  row.appendChild(wlBtn);
}

// ── dropped ──
function buildDropped(){
  if(!DROPPED.length)return;
  var bar=document.getElementById('dropped-bar');
  bar.style.display='block';
  bar.innerHTML='跌出：<b>'+DROPPED.join(' · ')+'</b>';
}

// ── 初始化 ──
document.getElementById('js-date').textContent=UPDATED_AT;
document.getElementById('js-univ').textContent=UNIV_SIZE;
document.getElementById('js-ver').textContent=VERSION;
buildFilters();
buildWLBar();
buildDropped();
render();

</script>
